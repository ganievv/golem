<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Bar Menu</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="app">

    <!-- ═══ TAB: MENU ═══ -->
    <div id="tab-menu" class="tab-content active">
      <div class="search-wrapper">
        <div class="search-bar">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
            <path d="m16.5 16.5 3.5 3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input type="text" id="search" data-i18n-ph="search_ph" placeholder="Поиск напитка..." autocomplete="off">
          <button id="search-clear" class="search-clear" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
              <path d="M6 6l12 12M6 18L18 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>
      <div id="menu-list"></div>
    </div>

    <!-- ═══ TAB: ORDER ═══ -->
    <div id="tab-order" class="tab-content">
      <div id="edit-banner" class="edit-banner" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span id="edit-banner-text"></span>
        <button id="edit-cancel-btn" class="edit-cancel" data-i18n="btn_cancel">Отмена</button>
      </div>
      <div class="order-header">
        <div class="order-inputs">
          <label class="input-label">
            <span class="input-title" data-i18n="label_table">Столик</span>
            <input type="text" id="table-number" data-i18n-ph="ph_table" placeholder="Номер" inputmode="numeric">
          </label>
          <label class="input-label">
            <span class="input-title" data-i18n="label_name">Имя</span>
            <input type="text" id="customer-name" data-i18n-ph="ph_name" placeholder="Необязательно">
          </label>
        </div>
      </div>
      <div id="order-items"></div>
      <div id="order-footer" style="display:none">
        <div class="order-total-row">
          <span class="total-label" data-i18n="total">Итого</span>
          <span id="total-price" class="total-amount">0.00€</span>
        </div>
        <div class="order-actions">
          <button id="clear-order-btn" class="btn-clear" data-i18n="btn_clear">Очистить</button>
          <button id="save-order-btn" class="btn-save" data-i18n="btn_save">💾 Сохранить заказ</button>
        </div>
      </div>
    </div>

    <!-- ═══ TAB: SAVED ORDERS ═══ -->
    <div id="tab-orders" class="tab-content">
      <div class="orders-toolbar" id="orders-toolbar" style="display:none">
        <span class="orders-toolbar-title" id="orders-count-label"></span>
        <button id="clear-all-orders-btn" class="btn-clear-all" data-i18n="btn_clear_all">Удалить все</button>
      </div>
      <div id="saved-orders-list"></div>
      <button id="grand-toggle-btn" class="grand-toggle-btn" style="display:none" aria-label="€">€</button>
      <div id="grand-total-bar" class="grand-total-bar" style="display:none">
        <div class="grand-total-row">
          <span class="grand-total-label" data-i18n="grand_orders">Все заказы</span>
          <span id="grand-total-amount" class="grand-total-amount">0.00€</span>
        </div>
        <div class="grand-total-row grand-tips-row" id="grand-tips-row" style="display:none">
          <span class="grand-total-label" data-i18n="grand_tips">Чаевые</span>
          <span id="grand-tips-amount" class="grand-tips-amount">0.00€</span>
        </div>
        <div class="grand-export-row">
          <button id="export-orders-btn" class="btn-export-orders">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <polyline points="7 10 12 15 17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span data-i18n="grand_export">Экспорт заказов</span>
          </button>
        </div>
      </div>
    </div>

  </div>

  <!-- ═══ BOTTOM NAVIGATION ═══ -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="menu">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M4 6h16M4 12h16M4 18h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span data-i18n="nav_menu">Меню</span>
    </button>
    <button class="nav-btn" data-tab="order">
      <div class="nav-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="2"/>
          <path d="M8 8h8M8 12h8M8 16h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="badge" id="order-badge" style="display:none">0</span>
      </div>
      <span data-i18n="nav_order">Заказ</span>
    </button>
    <button class="nav-btn" data-tab="orders">
      <div class="nav-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2Z" stroke="currentColor" stroke-width="2"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" stroke="currentColor" stroke-width="2"/>
        </svg>
        <span class="badge" id="orders-badge" style="display:none">0</span>
      </div>
      <span data-i18n="nav_orders">Заказы</span>
    </button>
    <button id="lang-btn" class="lang-btn">DE</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
